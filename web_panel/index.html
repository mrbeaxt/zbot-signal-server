<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-BOT | Professional Copy Trading</title>
    <style>
        :root {
            --bg: #080c17; --surface: #111827; --surface2: #1a2332; --border: #263040;
            --primary: #6366f1; --primary2: #8b5cf6; --accent: #06b6d4;
            --text: #e2e8f0; --text2: #94a3b8; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --info: #3b82f6; --radius: 14px; --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --glass: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; line-height:1.6;
            background-image: radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.08) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 60%);
        }
        /* Header */
        .header {
            background: rgba(17,24,39,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header .brand { font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent), var(--primary2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header .user-info { display: flex; align-items: center; gap: 12px; }
        .header .user-badge { background: var(--surface2); padding: 6px 14px; border-radius: 20px; font-size: 13px; color: var(--text2); }
        .header .role-badge {
            font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .role-badge.provider { background: rgba(99,102,241,0.2); color: #a5b4fc; }
        .role-badge.subscriber { background: rgba(6,182,212,0.2); color: #67e8f9; }
        /* Layout */
        .app-layout { display: flex; min-height: calc(100vh - 64px); }
        .sidebar {
            width: 240px; background: rgba(17,24,39,0.6); backdrop-filter: blur(10px);
            border-right: 1px solid var(--border); padding: 16px 12px; flex-shrink: 0;
        }
        .sidebar .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); padding: 8px 16px 4px; font-weight: 700; }
        .sidebar .nav-item {
            display: flex; align-items: center; gap: 10px; padding: 11px 16px;
            border-radius: 10px; cursor: pointer; margin-bottom: 2px; transition: all 0.25s ease;
            font-size: 13px; color: var(--text2); border: none; background: none; width: 100%; text-align: left;
            position: relative; overflow: hidden;
        }
        .sidebar .nav-item:hover { background: var(--surface2); color: var(--text); transform: translateX(3px); }
        .sidebar .nav-item.active { background: linear-gradient(135deg, var(--primary), var(--primary2)); color: #fff; font-weight: 600; box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
        .sidebar .nav-item .badge-count {
            margin-left: auto; background: var(--danger); color: #fff; font-size: 10px; min-width: 20px;
            height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700;
            animation: pulse 2s infinite;
        }
        .sidebar .nav-icon { font-size: 17px; width: 22px; text-align: center; }
        .main-content { flex: 1; padding: 24px; overflow-y: auto; max-height: calc(100vh - 64px); }
        /* Cards */
        .card {
            background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow);
            animation: fadeInUp 0.4s ease both; position: relative; overflow: hidden;
        }
        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: 0.08s; }
        .card:nth-child(3) { animation-delay: 0.16s; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99,102,241,0.4), transparent); }
        .card:hover { border-color: rgba(99,102,241,0.3); box-shadow: 0 12px 40px rgba(0,0,0,0.5); transition: all 0.3s; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .card-title { font-size: 17px; font-weight: 700; color: var(--text); }
        /* Stats grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px; position: relative; overflow: hidden;
            animation: fadeInUp 0.5s ease both; transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: rgba(99,102,241,0.3); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
        .stat-card .stat-icon { font-size: 28px; margin-bottom: 8px; }
        .stat-card .stat-value { font-size: 30px; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-card .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
        .stat-card:nth-child(1) { animation-delay: 0s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.2s; }
        .stat-card:nth-child(4) { animation-delay: 0.3s; }
        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px;
            font-size: 14px; background: var(--bg); color: var(--text); transition: all 0.25s; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .form-group textarea { min-height: 80px; resize: vertical; }
        /* Buttons */
        .btn {
            padding: 10px 20px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease; display: inline-flex; align-items: center; gap: 6px;
            position: relative; overflow: hidden;
        }
        .btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent); opacity: 0; transition: opacity 0.3s; }
        .btn:hover::after { opacity: 1; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary2)); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-info { background: var(--info); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--surface2); border-color: var(--primary); }
        .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }
        .btn-xs { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-glow {
            animation: btnGlow 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(99,102,241,0.5), 0 0 40px rgba(99,102,241,0.2);
        }
        /* Tables */
        .table-wrap { overflow-x: auto; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 14px; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--border); white-space: nowrap; }
        td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; white-space: nowrap; }
        tr { transition: background 0.2s; }
        tr:hover { background: rgba(99,102,241,0.05); }
        /* Badges */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-success { background: rgba(16,185,129,0.15); color: var(--success); }
        .badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
        .badge-info { background: rgba(59,130,246,0.15); color: var(--info); }
        .badge-purple { background: rgba(99,102,241,0.15); color: var(--primary); }
        .badge-cyan { background: rgba(6,182,212,0.15); color: var(--accent); }
        /* Toast */
        .toast {
            position: fixed; top: 20px; right: 20px; padding: 14px 24px;
            border-radius: 12px; color: #fff; font-weight: 600; z-index: 9999;
            animation: slideInRight 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            max-width: 420px; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .toast-success { background: linear-gradient(135deg, #059669, #10b981); }
        .toast-error { background: linear-gradient(135deg, #dc2626, #ef4444); }
        .toast-info { background: linear-gradient(135deg, #2563eb, #3b82f6); }
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            animation: fadeIn 0.2s ease;
        }
        .modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6); animation: scaleIn 0.25s ease;
        }
        .modal h3 { margin-bottom: 16px; color: var(--text); font-size: 18px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Auth page */
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
            background: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.1) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 100%, rgba(6,182,212,0.08) 0%, transparent 60%); }
        .auth-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 40px; width: 100%; max-width: 480px; box-shadow: 0 25px 80px rgba(0,0,0,0.5);
            animation: scaleIn 0.4s ease;
        }
        .auth-card .brand { font-size: 34px; font-weight: 800; margin-bottom: 6px; }
        .auth-card .subtitle { color: var(--text2); margin-bottom: 28px; font-size: 14px; }
        /* Role selection cards */
        .role-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .role-card {
            background: var(--glass); border: 2px solid var(--border); border-radius: 16px;
            padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .role-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 12px 36px rgba(99,102,241,0.2); }
        .role-card.selected { border-color: var(--primary); background: rgba(99,102,241,0.08); box-shadow: 0 0 30px rgba(99,102,241,0.25); }
        .role-card .role-icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .role-card .role-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .role-card .role-desc { font-size: 11px; color: var(--text2); }
        .role-card.selected::after {
            content: '✓'; position: absolute; top: 10px; right: 14px;
            background: var(--primary); color: #fff; width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
        }
        .auth-tabs { display: flex; margin-bottom: 24px; border-radius: 10px; overflow: hidden; background: var(--surface2); }
        .auth-tabs .tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text2); cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
        .auth-tabs .tab.active { background: linear-gradient(135deg, var(--primary), var(--primary2)); color: #fff; }
        .auth-actions { display: flex; gap: 10px; margin-top: 20px; }
        .auth-actions .btn { flex: 1; justify-content: center; }
        /* Token display */
        .token-box {
            background: var(--bg); border: 2px dashed var(--border); border-radius: 12px;
            padding: 20px; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 14px; word-break: break-all; color: var(--accent); position: relative;
            transition: all 0.3s;
        }
        .token-box:hover { border-color: var(--primary); background: rgba(99,102,241,0.03); }
        .copy-feedback { position: absolute; top: -8px; right: 12px; background: var(--success); color: #fff; padding: 3px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; font-family: inherit; animation: fadeInDown 0.3s ease; pointer-events: none; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        /* Skeleton */
        .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; height: 40px; margin-bottom: 12px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        /* Keyframes */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes btnGlow { 0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.5); } 50% { box-shadow: 0 0 40px rgba(99,102,241,0.8), 0 0 60px rgba(139,92,246,0.4); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-16 { margin-top: 16px; }
        .mb-16 { margin-bottom: 16px; }
        .flex-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text2); animation: fadeInUp 0.4s ease; }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
        .spinner {
            display: inline-block; width: 22px; height: 22px;
            border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        select { cursor: pointer; }
        /* Quick actions */
        .quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .quick-action {
            background: var(--glass); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px; cursor: pointer; transition: all 0.3s; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .quick-action:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(99,102,241,0.2); }
        .quick-action .qa-icon { font-size: 28px; }
        .quick-action .qa-label { font-size: 12px; font-weight: 600; color: var(--text2); }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .role-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ===================== AUTH PAGE ===================== -->
<div id="authPage" class="auth-container">
    <div class="auth-card">
        <div class="brand" style="background:linear-gradient(135deg,#6366f1,#06b6d4,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">⚡ Z-BOT</div>
        <p class="subtitle">Professional Copy Trading Platform</p>

        <!-- Step 1: Choose Role -->
        <div id="roleStep">
            <div style="font-weight:700;font-size:14px;margin-bottom:12px;color:var(--text);">I want to primarily:</div>
            <div class="role-cards">
                <div class="role-card" id="roleProvider" onclick="selectRole('provider')">
                    <span class="role-icon">📡</span>
                    <div class="role-title">Signal Provider</div>
                    <div class="role-desc">Create providers &amp; broadcast trading signals</div>
                </div>
                <div class="role-card" id="roleSubscriber" onclick="selectRole('subscriber')">
                    <span class="role-icon">📥</span>
                    <div class="role-title">Copy Trader</div>
                    <div class="role-desc">Follow top providers &amp; copy their trades</div>
                </div>
            </div>
            <button class="btn btn-primary" style="width:100%;justify-content:center;" id="roleNextBtn" disabled onclick="showRegisterForm()">Continue →</button>
        </div>

        <!-- Step 2: Register / Login -->
        <div id="authStep" class="hidden">
            <div class="auth-tabs">
                <button class="tab active" onclick="switchAuthTab('register')">Register</button>
                <button class="tab" onclick="switchAuthTab('login')">Login with Token</button>
            </div>
            <div id="registerForm">
                <div class="form-group"><label>Email Address</label><input type="email" id="regEmail" placeholder="your@email.com"></div>
                <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="John Doe"></div>
                <button class="btn btn-primary btn-glow" style="width:100%;justify-content:center;" onclick="register()">🚀 Create Account</button>
                <div id="regResult" class="mt-16 hidden">
                    <div style="font-size:12px;color:var(--warning);margin-bottom:8px;">⚠️ Save your token! You'll need it to login.</div>
                    <div class="token-box" id="regToken" style="margin-bottom:10px;"></div>
                    <div class="flex-row"><button class="btn btn-sm btn-outline" onclick="copyText('regToken')">📋 Copy</button><button class="btn btn-sm btn-primary" onclick="useRegToken()">🔓 Login Now</button></div>
                </div>
            </div>
            <div id="loginForm" class="hidden">
                <div class="form-group"><label>Your API Token</label><input type="text" id="loginToken" placeholder="Paste your token..."></div>
                <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="login()">🔓 Access Dashboard</button>
            </div>
            <div class="text-center mt-16"><button class="btn btn-sm btn-outline" onclick="backToRole()">← Back</button></div>
        </div>
    </div>
</div>

<!-- ===================== MAIN APP ===================== -->
<div id="appPage" class="hidden">
    <header class="header">
        <span class="brand">⚡ Z-BOT Copy Trading</span>
        <div class="user-info">
            <span id="roleBadge" class="role-badge"></span>
            <span class="user-badge" id="headerUser"></span>
            <button class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
        </div>
    </header>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="nav-section">Main</div>
            <button class="nav-item active" data-page="dashboard" onclick="showPage('dashboard',this)"><span class="nav-icon">📊</span> Dashboard</button>
            <button class="nav-item" data-page="token" onclick="showPage('token',this)"><span class="nav-icon">🔑</span> My Token</button>
            <button class="nav-item" data-page="profile" onclick="showPage('profile',this)"><span class="nav-icon">👤</span> Profile</button>
            <div class="nav-section">Copy Trading</div>
            <button class="nav-item" data-page="allProviders" onclick="showPage('allProviders',this)"><span class="nav-icon">🌐</span> All Providers</button>
            <button class="nav-item" data-page="myProviders" onclick="showPage('myProviders',this)" id="navMyProviders"><span class="nav-icon">⚙️</span> My Providers</button>
            <button class="nav-item" data-page="mySubscriptions" onclick="showPage('mySubscriptions',this)" id="navMySubscriptions"><span class="nav-icon">📡</span> My Subscriptions</button>
            <div class="nav-section">History</div>
            <button class="nav-item" data-page="signalHistory" onclick="showPage('signalHistory',this)"><span class="nav-icon">📜</span> Signal History</button>
        </aside>
        <main class="main-content" id="mainContent"></main>
    </div>
</div>

<!-- ===================== MODAL ===================== -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal" id="modalBox" onclick="event.stopPropagation()"></div>
</div>
<div id="toastContainer"></div>

<script>
// ===================== STATE =====================
const API = '/api/v1';
let authToken = localStorage.getItem('zbot_token') || '';
let userData = null;
let selectedRole = null;
let pendingRequestsCount = 0;

// ===================== TOAST =====================
function toast(msg, type='info') {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>el.remove(),300); }, 4000);
}

// ===================== API =====================
async function api(path, method='GET', body=null) {
    const opts = { method, headers: { 'Authorization': `Bearer ${authToken}` } };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const res = await fetch(`${API}${path}`, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || data.message || `Request failed (${res.status})`);
    return data;
}

// ===================== ROLE SELECTION =====================
function selectRole(role) {
    selectedRole = role;
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    document.getElementById(role === 'provider' ? 'roleProvider' : 'roleSubscriber').classList.add('selected');
    document.getElementById('roleNextBtn').disabled = false;
}

function showRegisterForm() {
    if (!selectedRole) return;
    document.getElementById('roleStep').classList.add('hidden');
    document.getElementById('authStep').classList.remove('hidden');
}

function backToRole() {
    document.getElementById('authStep').classList.add('hidden');
    document.getElementById('roleStep').classList.remove('hidden');
}

// ===================== AUTH =====================
function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tabs .tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.auth-tabs .tab').forEach(t=>{ if(t.textContent.toLowerCase().includes(tab)) t.classList.add('active'); });
    document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
    document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
    document.getElementById('regResult').classList.add('hidden');
}

async function register() {
    const email = document.getElementById('regEmail').value.trim();
    const name = document.getElementById('regName').value.trim();
    if (!email || !name) return toast('Please fill all fields', 'error');
    if (!email.includes('@')) return toast('Invalid email', 'error');
    try {
        const data = await api('/auth/register', 'POST', { email, name, user_type: selectedRole });
        const token = data.access_token;
        document.getElementById('regToken').textContent = token;
        document.getElementById('regResult').classList.remove('hidden');
        localStorage.setItem('zbot_token', token);
        toast('✅ Account created! Save your token below.', 'success');
    } catch(e) { toast(e.message, 'error'); }
}

function useRegToken() {
    document.getElementById('loginToken').value = document.getElementById('regToken').textContent;
    switchAuthTab('login');
    login();
}

async function login() {
    const token = document.getElementById('loginToken').value.trim();
    if (!token) return toast('Please enter your token', 'error');
    authToken = token;
    try {
        userData = await api('/auth/me');
        localStorage.setItem('zbot_token', token);
        loadApp();
        toast(`Welcome back, ${userData.user.name}!`, 'success');
    } catch(e) { authToken = ''; toast('Invalid token: ' + e.message, 'error'); }
}

function logout() {
    authToken = ''; userData = null;
    localStorage.removeItem('zbot_token');
    document.getElementById('authPage').classList.remove('hidden');
    document.getElementById('appPage').classList.add('hidden');
}

async function loadApp() {
    document.getElementById('authPage').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
    document.getElementById('headerUser').textContent = `👤 ${userData.user.name || userData.user.email}`;
    const ut = userData.user.user_type;
    const rb = document.getElementById('roleBadge');
    if (ut === 'provider') { rb.textContent = 'Provider'; rb.className = 'role-badge provider'; }
    else if (ut === 'subscriber') { rb.textContent = 'Subscriber'; rb.className = 'role-badge subscriber'; }
    else { rb.textContent = 'Trader'; rb.className = 'role-badge'; }
    // Fetch pending requests count
    try {
        const stats = await api('/dashboard/stats');
        pendingRequestsCount = stats.stats.pending_requests || 0;
        updatePendingBadge();
    } catch(e) { pendingRequestsCount = 0; }
    showPage('dashboard', document.querySelector('[data-page="dashboard"]'));
}

function updatePendingBadge() {
    const nav = document.getElementById('navMyProviders');
    let badge = nav.querySelector('.badge-count');
    if (pendingRequestsCount > 0) {
        if (!badge) { badge = document.createElement('span'); badge.className = 'badge-count'; nav.appendChild(badge); }
        badge.textContent = pendingRequestsCount;
    } else if (badge) { badge.remove(); }
}

// Auto-login
if (authToken) {
    (async () => {
        try {
            userData = await api('/auth/me');
            loadApp();
        } catch(e) { authToken=''; localStorage.removeItem('zbot_token'); }
    })();
}

// ===================== NAVIGATION =====================
function showPage(page, navBtn) {
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    if (navBtn) navBtn.classList.add('active');
    const content = document.getElementById('mainContent');
    switch(page) {
        case 'dashboard': renderDashboard(content); break;
        case 'token': renderTokenPage(content); break;
        case 'profile': renderProfilePage(content); break;
        case 'allProviders': renderAllProviders(content); break;
        case 'myProviders': renderMyProviders(content); break;
        case 'mySubscriptions': renderMySubscriptions(content); break;
        case 'signalHistory': renderSignalHistory(content); break;
    }
}

// ===================== MODAL =====================
function openModal(html) { document.getElementById('modalBox').innerHTML = html; document.getElementById('modalOverlay').classList.remove('hidden'); }
function closeModal(e) { if (!e || e.target === document.getElementById('modalOverlay')) { document.getElementById('modalOverlay').classList.add('hidden'); } }

// ===================== TOKEN PAGE =====================
function renderTokenPage(container) {
    const token = userData?.user?.access_token || 'N/A';
    container.innerHTML = `
        <h2 style="margin-bottom:20px;">🔑 My API Token</h2>
        <div class="card" style="max-width:700px;">
            <div class="card-header"><span class="card-title">🔐 Your Access Token</span></div>
            <p style="color:var(--text2);font-size:13px;margin-bottom:16px;">This token grants access to your account. Keep it secure and never share it with anyone.</p>
            <div class="token-box" id="tokenDisplay">${esc(token)}</div>
            <div class="flex-row" style="margin-top:12px;">
                <button class="btn btn-primary" onclick="copyToken()"><span id="copyBtnText">📋 Copy Token</span></button>
                <button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText('${esc(token)}').then(()=>toast('Token copied!','success'))">📋 Copy Alt</button>
            </div>
            <div style="margin-top:20px;padding:14px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:10px;">
                <strong style="color:var(--warning);font-size:13px;">⚠️ Important</strong>
                <p style="color:var(--text2);font-size:12px;margin-top:4px;">If you lose this token, you can always find it here or recover it by registering again with the same email address.</p>
            </div>
        </div>
    `;
}

function copyToken() {
    const token = userData?.user?.access_token || '';
    navigator.clipboard.writeText(token).then(() => {
        const btn = document.getElementById('copyBtnText');
        const orig = btn.textContent;
        btn.textContent = '✅ Copied!';
        btn.style.color = '#10b981';
        setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
        toast('Token copied to clipboard!', 'success');
    }).catch(() => toast('Failed to copy. Please copy manually.', 'error'));
}

function copyText(elementId) {
    const text = document.getElementById(elementId).textContent;
    navigator.clipboard.writeText(text).then(() => toast('Copied!', 'success'));
}

                <div class="stat-card"><div class="stat-icon">📡</div><div class="stat-value">${s.own_providers}</div><div class="stat-label">My Providers</div></div>

            </div>
        `;

async function saveProfile() {
    const name = document.getElementById('profileName').value.trim();
    const user_type = document.getElementById('profileType').value;
    if (!name) return toast('Name is required', 'error');
    try {
        userData = await api('/auth/me', 'PUT', { name, user_type });
        toast('Profile updated!', 'success');
        document.getElementById('headerUser').textContent = `👤 ${userData.user.name}`;
        const ut = userData.user.user_type;
        const rb = document.getElementById('roleBadge');
        if (ut === 'provider') { rb.textContent = 'Provider'; rb.className = 'role-badge provider'; }
        else if (ut === 'subscriber') { rb.textContent = 'Subscriber'; rb.className = 'role-badge subscriber'; }
        else { rb.textContent = 'Trader'; rb.className = 'role-badge'; }
    } catch(e) { toast('Error: ' + e.message, 'error'); }
}

                <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value">${s.total_subscribers||0}</div><div class="stat-label">Total Subscribers</div></div>

                <div class="stat-card"><div class="stat-icon">🌐</div><div class="stat-value">${s.available_providers||allP.length}</div><div class="stat-label">Available Providers</div></div>
                <div class="stat-card"><div class="stat-icon">📡</div><div class="stat-value">${myP.length}</div><div class="stat-label">My Providers</div></div>
                <div class="stat-card"><div class="stat-icon">👋</div><div class="stat-value" style="font-size:20px;">${esc(userData?.user?.name||'Trader')}</div><div class="stat-label">Welcome</div></div>

        let contentHtml = '<div class="card"><div class="card-header"><span class="card-title">🚀 Quick Actions</span></div><div class="quick-actions">';
        contentHtml += `<div class="quick-action" onclick="showPage('token',document.querySelector('[data-page=token]'))"><span class="qa-icon">🔑</span><span class="qa-label">View API Token</span></div>`;
        contentHtml += `<div class="quick-action" onclick="showPage('allProviders',document.querySelector('[data-page=allProviders]'))"><span class="qa-icon">🌐</span><span class="qa-label">Browse Providers</span></div>`;
        if (ut === 'provider') {

// ===================== ALL PROVIDERS =====================
async function renderAllProviders(container) {
    container.innerHTML = '<div class="spinner"></div> Loading providers...';
    try {
        const res = await api('/providers?subscribed=false&is_owner=false');
        const providers = res.providers || [];
        container.innerHTML = `
            <div class="card-header" style="margin-bottom:16px;"><span class="card-title">🌐 All Signal Providers</span><button class="btn btn-sm btn-outline" onclick="renderAllProviders(document.getElementById('mainContent'))">🔄 Refresh</button></div>
            ${providers.length === 0 ? '<div class="empty-state"><div class="icon">📭</div><p>No providers available yet.</p></div>' : `
            <div class="card"><div class="table-wrap"><table><thead><tr><th>Name</th><th>Membership</th><th>Observations</th><th>Created</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>${providers.map(p=>`<tr><td><b>${esc(p.name)}</b></td><td><span class="badge badge-purple">${esc(p.membership_value||'Free')}</span></td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;">${esc(p.observations||'—')}</td><td>${fmtDate(p.created_at)}</td><td>${p.subscription_requested?'<span class="badge badge-warning">Pending</span>':'<span class="badge badge-info">Available</span>'}</td><td>${p.subscription_requested?'<button class="btn btn-xs btn-outline" disabled>Requested</button>':'<button class="btn btn-xs btn-info" onclick="subscribeToProvider(\''+p.id+'\')">Subscribe</button>'}</td></tr>`).join('')}</tbody></table></div></div>

        `;
    } catch(e) { container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${esc(e.message)}</p></div>`; }

async function subscribeToProvider(providerId) {
    const contact = prompt('Enter your contact info (Telegram/WhatsApp):');
    if (!contact) return;
    try {
        await api(`/providers/${providerId}/requests`, 'POST', { email: userData.user.email, contact });
        toast('Subscription request sent!', 'success');
        renderAllProviders(document.getElementById('mainContent'));
    } catch(e) { toast('Error: ' + e.message, 'error'); }
}

function showCreateProviderModal() {
    openModal(`
        <h3>＋ Create New Provider</h3>
        <div class="form-group"><label>Provider Name</label><input id="cpName" placeholder="e.g., Pro Trader Signals"></div>
        <div class="form-group"><label>Membership Value</label><input id="cpMembership" placeholder="Free" value="Free"></div>
        <div class="form-group"><label>Observations</label><textarea id="cpObs" placeholder="Describe your trading strategy..."></textarea></div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="createProvider()">Create Provider</button></div>
    `);
}

async function createProvider() {
    const name = document.getElementById('cpName').value.trim();
    const membership_value = document.getElementById('cpMembership').value.trim() || 'Free';
    const observations = document.getElementById('cpObs').value.trim();
    if (!name) return toast('Name is required', 'error');
    try {
        await api('/providers', 'POST', { name, membership_value, observations });
        toast('Provider created!', 'success');
        closeModal();
        renderMyProviders(document.getElementById('mainContent'));
    } catch(e) { toast('Error: ' + e.message, 'error'); }
}

function showEditProviderModal(id, name, membership_value, observations) {
    openModal(`
        <h3>✏️ Edit Provider</h3>
        <div class="form-group"><label>Provider Name</label><input id="epName" value="${name}"></div>
        <div class="form-group"><label>Membership Value</label><input id="epMembership" value="${membership_value}"></div>
        <div class="form-group"><label>Observations</label><textarea id="epObs">${observations}</textarea></div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="editProvider('${id}')">Save Changes</button></div>
    `);
}

async function editProvider(id) {
    const body = {};
    const name = document.getElementById('epName')?.value?.trim();
    const membership_value = document.getElementById('epMembership')?.value?.trim();
    const observations = document.getElementById('epObs')?.value?.trim();
    if (name) body.name = name;
    if (membership_value) body.membership_value = membership_value;
    if (observations) body.observations = observations;
    try { await api(`/providers/${id}`, 'PUT', body); toast('Provider updated!', 'success'); closeModal(); renderMyProviders(document.getElementById('mainContent')); }
    catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function deleteProvider(id) {
    if (!confirm('Are you sure? This cannot be undone.')) return;
    try { await api(`/providers/${id}`, 'DELETE'); toast('Provider deleted!', 'success'); renderMyProviders(document.getElementById('mainContent')); }
    catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function resetProviderHistory(providerId, providerName) {
    if (!confirm(`Reset ALL trading history for "${providerName}"?\n\nThis will permanently delete:\n• All signal history\n• All trade records (win rate, profit, total signals)\n\nThis CANNOT be undone.`)) return;
    try {
        const result = await api(`/providers/${providerId}/reset-history`, 'POST');
        const d = result.deleted || {};
        toast(`History reset! ${d.signals||0} signals + ${d.trades||0} trades deleted.`, 'success');
        renderMyProviders(document.getElementById('mainContent'));
        // Refresh dashboard if visible
        if (document.querySelector('[data-page="dashboard"].active') || document.querySelector('.nav-item.active[data-page="dashboard"]')) {
            renderDashboard(document.getElementById('mainContent'));
        }
    } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function viewProviderRequests(providerId) {
    try {
        const res = await api(`/providers/${providerId}/requests`);
        const requests = res.requests || [];
        let html = `<h3>📋 Subscription Requests (${requests.length})</h3>`;
        if (requests.length === 0) { html += '<p style="color:var(--text2);margin-top:12px;">No pending requests.</p>'; }
        else {
            html += '<div style="max-height:400px;overflow-y:auto;margin-top:12px;">';
            requests.forEach(r => {
                html += `<div style="background:var(--surface2);padding:12px;border-radius:8px;margin-bottom:8px;"><b>${esc(r.user_email||'Unknown')}</b><br><span style="color:var(--text2);font-size:13px;">Contact: ${esc(r.contact||'N/A')}</span><div class="flex-row" style="margin-top:8px;"><button class="btn btn-xs btn-success" onclick="approveRequest('${providerId}','${r.id}')">✅ Approve</button><button class="btn btn-xs btn-danger" onclick="rejectRequest('${providerId}','${r.id}')">❌ Reject</button></div></div>`;
            });
            html += '</div>';
        }
        html += '<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>';
        openModal(html);
    } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function approveRequest(providerId, requestId) {
    try { await api(`/providers/${providerId}/requests/${requestId}/approve`, 'POST', { demo_access: true }); toast('Request approved!', 'success'); closeModal(); viewProviderRequests(providerId); }
    catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function rejectRequest(providerId, requestId) {
    try { await api(`/providers/${providerId}/requests/${requestId}/reject`, 'POST'); toast('Request rejected!', 'success'); closeModal(); viewProviderRequests(providerId); }
    catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function viewProviderSubscribers(providerId) {
    try {
        const res = await api(`/providers/${providerId}/subscriptions`);
        const subs = res.subscriptions || [];
        let html = `<h3>👥 Subscribers (${subs.length})</h3>`;
        if (subs.length === 0) { html += '<p style="color:var(--text2);margin-top:12px;">No subscribers yet.</p>'; }
        else {
            html += '<div style="max-height:400px;overflow-y:auto;margin-top:12px;">';
            subs.forEach(s => {
                html += `<div style="background:var(--surface2);padding:12px;border-radius:8px;margin-bottom:8px;"><b>${esc(s.user_email||'Unknown')}</b><br><span style="color:var(--text2);font-size:13px;">Contact: ${esc(s.contact||'N/A')} | Expires: ${s.expires_at?fmtDate(s.expires_at):'Never'} | Access: ${s.real_access?'Real':'Demo'}</span><div class="flex-row" style="margin-top:8px;"><button class="btn btn-xs btn-warning" onclick="updateSubExpiry('${providerId}','${s.id}')">⏰ Set Expiry</button><button class="btn btn-xs btn-danger" onclick="removeSubscriber('${providerId}','${s.id}')">🗑 Remove</button></div></div>`;
            });
            html += '</div>';
        }
        html += '<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Close</button></div>';
        openModal(html);
    } catch(e) { toast('Error: ' + e.message, 'error'); }
}

function updateSubExpiry(providerId, subId) {
    const date = prompt('Enter expiry date (YYYY-MM-DD):', new Date(Date.now()+30*86400000).toISOString().split('T')[0]);
    if (!date) return;
    (async()=>{
        try { await api(`/providers/${providerId}/subscriptions/${subId}/set-expiration`, 'POST', { expires_at: new Date(date).toISOString() }); toast('Expiry updated!', 'success'); closeModal(); viewProviderSubscribers(providerId); }
        catch(e) { toast('Error: ' + e.message, 'error'); }
    })();
}

async function removeSubscriber(providerId, subId) {
    if (!confirm('Remove this subscriber?')) return;
    try { await api(`/providers/${providerId}/subscriptions/${subId}/unsubscribe`, 'POST'); toast('Subscriber removed!', 'success'); closeModal(); viewProviderSubscribers(providerId); }
    catch(e) { toast('Error: ' + e.message, 'error'); }
}

// ===================== MY SUBSCRIPTIONS =====================
async function renderMySubscriptions(container) {
    container.innerHTML = '<div class="spinner"></div> Loading subscriptions...';
    try {
        const res = await api('/providers?subscribed=true');
        const providers = res.providers || [];
        container.innerHTML = `
            <div class="card-header" style="margin-bottom:16px;"><span class="card-title">📡 My Subscriptions</span><button class="btn btn-sm btn-outline" onclick="renderMySubscriptions(document.getElementById('mainContent'))">🔄 Refresh</button></div>
            ${providers.length === 0 ? '<div class="empty-state"><div class="icon">📭</div><p>No active subscriptions.<br>Browse "All Providers" to subscribe!</p></div>' : providers.map(p=>`
            <div class="card" style="padding:16px;margin-bottom:12px;">
                <div class="card-header"><span class="card-title">📡 ${esc(p.name)}</span><span class="badge ${p.real_access?'badge-danger':'badge-success'}">${p.real_access?'Real Account':'Demo Account'}</span></div>
                <p style="color:var(--text2);font-size:13px;margin-bottom:8px;">Expires: ${p.expires_at?fmtDate(p.expires_at):'Never'} | Membership: ${esc(p.membership_value||'Free')}</p>
                <button class="btn btn-xs btn-danger" onclick="unsubscribe('${p.id}','${p.subscription_id}')">🗑 Cancel Subscription</button>
            </div>`).join('')}
        `;
    } catch(e) { container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${esc(e.message)}</p></div>`; }
}

async function unsubscribe(providerId, subId) {
    if (!confirm('Are you sure you want to cancel this subscription?')) return;
    try { await api(`/providers/${providerId}/subscriptions/${subId}/unsubscribe`, 'POST'); toast('Subscription cancelled!', 'success'); renderMySubscriptions(document.getElementById('mainContent')); }
    catch(e) { toast('Error: ' + e.message, 'error'); }
}

// ===================== SIGNAL HISTORY =====================
async function renderSignalHistory(container) {
    container.innerHTML = '<div class="spinner"></div> Loading signal history...';
    try {
        const res = await api('/providers?subscribed=true');
        const providers = res.providers || [];
        if (providers.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📜</div><p>Subscribe to providers first to see signal history.</p></div>';
            return;
        }
        const pid = providers[0].id;
        const sigRes = await api(`/signals/${pid}?limit=50`);
        const signals = sigRes.signals || [];
        container.innerHTML = `
            <div class="card-header" style="margin-bottom:16px;"><span class="card-title">📜 Signal History</span><button class="btn btn-sm btn-outline" onclick="renderSignalHistory(document.getElementById('mainContent'))">🔄 Refresh</button></div>
            ${signals.length === 0 ? '<div class="empty-state"><div class="icon">📭</div><p>No signals received yet.</p></div>' : `
            <div class="card"><div class="table-wrap"><table><thead><tr><th>Provider</th><th>Asset</th><th>Direction</th><th>Duration</th><th>Timestamp</th></tr></thead>
            <tbody>${signals.map(s=>`<tr><td>${esc(providers[0].name)}</td><td><b>${esc(s.asset||s.signal_data?.asset||'N/A')}</b></td><td><span class="badge ${(s.direction||s.signal_data?.direction)==='CALL'?'badge-success':'badge-danger'}">${esc(s.direction||s.signal_data?.direction||'N/A')}</span></td><td>${esc(String(s.duration||s.signal_data?.duration||'N/A'))} min</td><td>${fmtDate(s.timestamp)}</td></tr>`).join('')}</tbody></table></div></div>
            `}
        `;
    } catch(e) { container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${esc(e.message)}</p></div>`; }
}

// ===================== HELPERS =====================
function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmtDate(iso) {
    if (!iso) return 'N/A';
    try { return new Date(iso).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
    catch(e) { return iso; }
}
