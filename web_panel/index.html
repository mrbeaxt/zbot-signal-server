<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-BOT Copy Trading Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
        }

        .logo p {
            color: #666;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .token-display {
            background: #f8f9fa;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .copy-btn {
            margin-top: 10px;
            padding: 10px;
            background: #28a745;
            font-size: 14px;
        }

        .info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🚀 Z-BOT</h1>
            <p>Copy Trading Panel</p>
        </div>

        <!-- Registration Form -->
        <div id="registerForm">
            <h2 style="margin-bottom: 20px; color: #333;">Create Your Account</h2>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>

            <button onclick="register()">Create Account & Get Token</button>

            <div id="successMsg" class="success">
                ✅ Account created successfully!
                <div class="token-display" id="tokenDisplay"></div>
                <button class="copy-btn" onclick="copyToken()">📋 Copy Token</button>
                <div class="info" style="margin-top: 15px;">
                    <strong>Next Step:</strong><br>
                    Enter this token in your Z-BOT application under Copy Trading settings.
                </div>
            </div>

            <div id="errorMsg" class="error"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api/v1';

        async function register() {
            const email = document.getElementById('email').value.trim();
            const name = document.getElementById('name').value.trim();
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');

            // Hide previous messages
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';

            // Validate
            if (!email || !name) {
                errorMsg.textContent = '❌ Please fill in all fields!';
                errorMsg.style.display = 'block';
                return;
            }

            if (!email.includes('@')) {
                errorMsg.textContent = '❌ Please enter a valid email!';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                console.log('Registering:', email, name);
                
                const response = await fetch(`${API_URL}/auth/register?email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok || response.status === 200) {
                    const token = data.access_token || data.user?.access_token;
                    if (token) {
                        document.getElementById('tokenDisplay').textContent = token;
                        successMsg.style.display = 'block';
                        
                        // Store token in localStorage for convenience
                        localStorage.setItem('zbot_token', token);
                        localStorage.setItem('zbot_email', email);
                    } else {
                        errorMsg.textContent = '❌ No token received. Please try again.';
                        errorMsg.style.display = 'block';
                    }
                } else {
                    errorMsg.textContent = '❌ ' + (data.detail || data.message || 'Registration failed!');
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Registration error:', error);
                errorMsg.textContent = '❌ Network error: ' + error.message + '. Please check console (F12) for details.';
                errorMsg.style.display = 'block';
            }
        }

        function copyToken() {
            const token = document.getElementById('tokenDisplay').textContent;
            navigator.clipboard.writeText(token).then(() => {
                alert('✅ Token copied to clipboard!');
            });
        }

        // Auto-fill if returning user
        window.onload = function() {
            const savedEmail = localStorage.getItem('zbot_email');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
            }
        };
    </script>
</body>
</html>
