services:
  - type: web
    name: zbot-signal-server
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r render_server_requirements.txt
    startCommand: uvicorn signal_server_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: zbot-database
          property: connectionString

databases:
  - name: zbot-database
    databaseName: zbot_signals
    plan: free
